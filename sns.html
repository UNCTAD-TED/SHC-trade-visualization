<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>SHC Trade — SNS Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #050f23;
      font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    #sns-app {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* ── Splash ── */
    #splash {
      position: absolute;
      inset: 0;
      background: #050f23;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 14px;
      transition: opacity 0.8s ease;
    }
    .splash-logo  { font-size: 14px; font-weight: 700; color: #009edb; letter-spacing: 4px; }
    .splash-title { font-size: 22px; font-weight: 400; color: #c8d8ef; }
    .splash-sub   { font-size: 13px; color: #3a5070; }
    #splash-bar-wrap {
      width: 320px; height: 3px;
      background: #1a3558; border-radius: 2px; overflow: hidden;
    }
    #splash-bar {
      height: 100%; width: 0%;
      background: #009edb;
      transition: width 0.3s ease;
    }

    /* ── Map container (SVG layer) ── */
    #map-container {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
    }

    /* ── Chart panel (HTML overlay, right side) ── */
    #sns-panel {
      position: absolute;
      right: 20px;
      top: 80px;
      width: 320px;
      height: 640px;
      background: rgba(2, 10, 26, 0.84);
      border-radius: 8px;
      border: 1px solid rgba(0, 158, 219, 0.18);
      display: flex;
      flex-direction: column;
      z-index: 10;
      overflow: hidden;
    }

    /* ── Each half-section (Export / Import) ── */
    .sns-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      padding: 10px 14px 8px;
    }

    .sns-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    .sns-section-title.export { color: #009edb; }
    .sns-section-title.import { color: #72bf44; }

    .sns-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    /* ── Chart area (contains absolutely-positioned rows) ── */
    .sns-chart {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Individual rank row ── */
    .race-row {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
      will-change: transform, opacity;
      /* CSS transition as fallback; D3 also drives this */
    }

    .row-flag {
      width: 72px;
      flex-shrink: 0;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.82);
      white-space: nowrap;
      overflow: hidden;
      line-height: 28px;
    }

    .row-bar-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .row-bar {
      height: 13px;
      border-radius: 3px;
      opacity: 0.84;
      flex-shrink: 0;
      min-width: 2px;
    }

    .row-val {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.46);
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="sns-app">

    <!-- Splash screen -->
    <div id="splash">
      <div class="splash-logo">UNCTAD</div>
      <div class="splash-title">Second-Hand Clothes Trade Monitor</div>
      <div class="splash-sub">Loading 10 years of trade data…</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
    </div>

    <!-- SVG map (header, map, arcs, timeline rendered here) -->
    <div id="map-container"></div>

    <!-- HTML chart panel (flag emojis + bar chart race) -->
    <div id="sns-panel">
      <div class="sns-section">
        <div class="sns-section-title export">▲ &nbsp;TOP EXPORTERS</div>
        <div id="export-chart" class="sns-chart"></div>
      </div>

      <div class="sns-divider"></div>

      <div class="sns-section">
        <div class="sns-section-title import">▼ &nbsp;TOP IMPORTERS</div>
        <div id="import-chart" class="sns-chart"></div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/sns/sns.js"></script>
</body>
</html>
